<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THIS Content Manager</title>
    <link rel="icon" type="image/png" href="../pwa-192x192.png" />
    <!-- Netlify Identity Widget (Mandatory for Git Gateway authentication) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      /* Customize Decap CMS Admin Console with THIS Premium Dark Green Theme */
      body {
        font-family: 'Inter', sans-serif !important;
      }
      
      /* Target the Header of Decap CMS */
      header, [class*="HeaderContainer"], .css-1h0a4o2-header-container {
        background-color: #033c2a !important; /* Deep Jungle Green */
        color: #ffffff !important;
        border-bottom: 3px solid #20b887 !important; /* Clinical Emerald Accent */
      }
      
      /* Sidebar Container */
      aside, [class*="SidebarContainer"], .css-1s82n4g-sidebar-container {
        background-color: #f4fbf7 !important; /* Soft mint sidebar background */
        border-right: 1px solid rgba(3, 60, 42, 0.08) !important;
      }
      
      /* Sidebar Links Active State */
      [class*="SidebarNavLinkActive"], .css-1t6y21s-sidebar-link-active {
        background-color: #033c2a !important;
        color: #ffffff !important;
        font-weight: bold !important;
        border-radius: 0.5rem !important;
        border-left: 4px solid #20b887 !important;
      }

      /* Buttons inside Decap CMS */
      button, [class*="Button"] {
        background-color: #033c2a !important;
        color: #ffffff !important;
        border-radius: 0.5rem !important;
        transition: all 0.2s ease !important;
      }

      button:hover, [class*="Button"]:hover {
        background-color: #20b887 !important; /* Emerald on hover */
      }

      /* Custom Banner logo */
      [class*="Logo"], .css-1nc6jli-LogoContainer {
        font-weight: 900 !important;
        color: #20b887 !important;
        letter-spacing: -0.02em !important;
      }
    </style>
  </head>
  <body>
    <!-- Include Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
